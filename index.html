<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ICPC Live Scoreboard</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ICPC Contest Scoreboard</h1>
            <div id="contest-status">Live Ranking</div>
        </header>
        
        <table id="scoreboard">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Team Name</th>
                    <th>Solved</th>
                    <th>Time</th>
                    <th>A</th>
                    <th>B</th>
                    <th>C</th>
                    <th>D</th>
                    <th>E</th>
                    <th>F</th>
                </tr>
            </thead>
            <tbody id="team-rows">
                </tbody>
        </table>
    </div>
    <script src="./js/script.js"></script>
</body>
</html>
